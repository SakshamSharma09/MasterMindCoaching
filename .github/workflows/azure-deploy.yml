name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: mastermind-api-2404
  BACKEND_URL: https://mastermind-api-2404-eadxgpe5f7dch9f6.centralindia-01.azurewebsites.net
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # JOB 1: Build & Deploy Backend (.NET 9 API)
  # ============================================
  build-and-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ./src/backend/MasterMind.API/MasterMind.API.csproj

    - name: Build
      run: dotnet build ./src/backend/MasterMind.API/MasterMind.API.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ./src/backend/MasterMind.API/MasterMind.API.csproj --configuration Release --no-build --output ./publish

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ./publish

    - name: Verify Backend Health
      run: |
        echo "Waiting 45s for deployment to start..."
        sleep 45
        for i in 1 2 3 4 5; do
          if curl -sf ${{ env.BACKEND_URL }}/health; then
            echo ""
            echo "Health check passed!"
            exit 0
          fi
          echo "Attempt $i failed, waiting 15s..."
          sleep 15
        done
        echo "Health check did not pass yet (DB may be resuming from auto-pause)"

  # ============================================
  # JOB 2: Build & Deploy Frontend (Vue.js SPA)
  # ============================================
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-deploy-backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/frontend/mastermind-web/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: src/frontend/mastermind-web

    - name: Build frontend
      run: npx vite build
      working-directory: src/frontend/mastermind-web
      env:
        VITE_API_BASE_URL: ${{ env.BACKEND_URL }}/api
        VITE_APP_NAME: MasterMind Coaching
        VITE_NODE_ENV: production

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        skip_app_build: true
        app_location: "src/frontend/mastermind-web/dist"
        output_location: ""
